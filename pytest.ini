[pytest]
addopts = --strict-markers
# Both roots, explicitly. `tests/` holds a suite per plugin; each package keeps
# its own suite beside it. The rule is what ships: plugins/ is copied verbatim
# into every user's plugin cache, so test baggage there is dead weight, whereas
# a package build stages only src/ + pyproject/README/LICENSE and never carries
# tests into the wheel.
#
# Naming `packages` here is load-bearing, not decorative — dropping it would
# silently stop collecting ~950 of the suite's tests while still exiting 0.
testpaths = tests packages
