name: Contract drift guards

# The plugin's prose has to stay true to the contract it authors against. This
# suite (tests/schema_drift/) is the gate, in three parts:
#   - enum/vocabulary pins: values the plugin restates as decision logic
#     (enum-mappers.md, CLAUDE.md, io-contracts.md, value-expressions.md) must
#     match the contract, including the validator ids and resolution scopes;
#   - generated-reference sync: references/advisory-rules.md is rendered from the
#     contract's advisory registry and must not be stale;
#   - example validity: every connector/endpoint under skills/*/examples/ must
#     validate, since creator agents copy them as archetypes.
#
# The guard reads the enums straight from the pinned `analitiq-contract-models`
# package — the same contract the `connector-schema-validator` agent enforces —
# so it runs OFFLINE and DETERMINISTIC (no schema fetch). That makes it a real
# PR/push merge gate, which the old CDN-fetch version couldn't be. It pins the
# plugin's prose to the contract the validator ENFORCES, not to whatever is live
# on the CDN; catching a *newer* upstream contract release is a dependency-bump
# concern (bump the pin below + in src/agents/connector-schema-validator.md),
# not this guard's job.

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

# Read-only: the suite only checks out and runs pytest — no secrets, no writes.
permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift:
    name: Contract drift guards (pinned contract models)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pinned validator + contract models
        # Pin BOTH and keep them in lockstep with the self-install pin in
        # src/agents/connector-schema-validator.md. rc11's validator already
        # pins analitiq-contract-models==1.0.0rc11 exactly, so double-pinning is
        # defensive (explicit + reproducible, and safe if a future validator
        # ever loosens that constraint).
        run: pip install pytest --pre "analitiq-validator==1.0.0rc11" "analitiq-contract-models==1.0.0rc11"
      - name: Run offline drift guards
        # DRIFT_REQUIRE_CONTRACT_MODELS=1 turns a missing/broken contract package
        # into a hard failure instead of an all-skipped green run — this job is a
        # merge gate, so it must never pass without actually running the checks.
        env:
          DRIFT_REQUIRE_CONTRACT_MODELS: '1'
        run: pytest tests/schema_drift/ -v -rs
