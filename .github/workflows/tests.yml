name: Schema drift guards

# The plugin restates a few schema-owned enum vocabularies as decision logic
# (enum-mappers.md, CLAUDE.md, io-contracts.md). This suite
# (tests/schema_drift/) pins them to the live published contract and fails if
# they diverge. Every test is network-marked and fetches the live schema, so it
# runs on a daily schedule + on demand — never on PRs — so a flaky or
# unreachable schema host can't block merges.
#
# The connector validator itself is an external package (analitiq-validator),
# tested upstream before release; the plugin no longer re-tests it, so there is
# no offline unit suite here.

on:
  schedule:
    # Daily — catches contract drift (or an unreachable schema host) even when
    # no one opens a PR. If schemas.analitiq.ai is unreachable the guards
    # `pytest.skip`, so an outage shows as a skipped (not failed) run; `-rs`
    # prints the skip reasons in the log.
    - cron: '17 6 * * *'
  workflow_dispatch:

# Read-only: the suite only checks out and runs pytest — no secrets, no writes.
permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift:
    name: Schema enum-drift guards (live schema)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pytest
      - name: Run network drift guards
        run: pytest tests/schema_drift/ -m network -v -rs
