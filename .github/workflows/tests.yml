name: Schema drift guards

# The plugin restates a few schema-owned enum vocabularies as decision logic
# (enum-mappers.md, CLAUDE.md, io-contracts.md). This suite
# (tests/schema_drift/) pins them to the contract and fails if they diverge.
#
# The guard reads the enums straight from the pinned `analitiq-contract-models`
# package — the same contract the `connector-schema-validator` agent enforces —
# so it runs OFFLINE and DETERMINISTIC (no schema fetch). That makes it a real
# PR/push merge gate, which the old CDN-fetch version couldn't be. It pins the
# plugin's prose to the contract the validator ENFORCES, not to whatever is live
# on the CDN; catching a *newer* upstream contract release is a dependency-bump
# concern (bump the pin below + in src/agents/connector-schema-validator.md),
# not this guard's job.

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

# Read-only: the suite only checks out and runs pytest — no secrets, no writes.
permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift:
    name: Schema enum-drift guards (pinned contract models)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pinned validator + contract models
        # Pin BOTH: the validator's dependency range on the contract models is
        # loose, so leaving them to float can resolve a newer, incompatible
        # release. Keep these in lockstep with the self-install pin in
        # src/agents/connector-schema-validator.md.
        run: pip install pytest --pre "analitiq-validator==1.0.0rc10" "analitiq-contract-models==1.0.0rc10"
      - name: Run offline drift guards
        run: pytest tests/schema_drift/ -v -rs
