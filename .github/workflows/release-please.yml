name: release-please

# Monorepo mode: one independently-versioned release train per publishable
# artifact, configured in release-please-config.json. Each derives its own semver
# from Conventional Commit types and maintains its OWN rolling Release PR
# (`separate-pull-requests: true`). Merging one bumps that artifact's version,
# regenerates its CHANGELOG.md, and tags it `<component>-vX.Y.Z`
# (`include-component-in-tag: true`) so the trains never collide.
#
# Bump signal lives in the commit / squashed PR title:
#   fix:                      -> patch
#   feat:                     -> minor   (patch while pre-1.0)
#   feat!: / BREAKING CHANGE: -> major   (minor while pre-1.0)
# Scope it to the artifact so it lands in the right train:
#   feat(connector-builder): ...
# When squash-merging, enable "Default to PR title for squash merge commits" in
# the repo settings - that title is what release-please parses.
#
# PUBLISHING RUNS HERE, in this workflow, gated on the action's outputs - never
# in a separate `on: push: tags:` workflow. Tags created with GITHUB_TOKEN do not
# trigger other workflows (GitHub suppresses that to prevent loops), so a
# separate publish workflow would silently never fire. Keeping it in-run also
# scopes `id-token: write` to just the job that needs it.
#
# The two PyPI packages publish through the reusable workflows below, invoked
# from THIS run rather than by their own tag trigger, for the reason above.
# They authenticate by PyPI Trusted Publishing (no token) behind the `pypi`
# environment. See CLAUDE.md "Credentials".

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      # Per-path outputs are keyed `<path>--<field>`; empty when that package had
      # no release in this run, which is what the publish jobs gate on.
      contract_models_version: ${{ steps.release.outputs['packages/contract-models--version'] }}
      validator_version: ${{ steps.release.outputs['packages/validator--version'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Defaults read release-please-config.json and
          # .release-please-manifest.json from the repo root.

  publish-contract-models:
    needs: release-please
    if: needs.release-please.outputs.contract_models_version != ''
    uses: ./.github/workflows/contract-models-release.yml
    with:
      version: ${{ needs.release-please.outputs.contract_models_version }}
    permissions:
      contents: read
      id-token: write # OIDC token for PyPI Trusted Publishing

  publish-validator:
    needs: release-please
    if: needs.release-please.outputs.validator_version != ''
    uses: ./.github/workflows/validator-release.yml
    with:
      version: ${{ needs.release-please.outputs.validator_version }}
    permissions:
      contents: read
      id-token: write
