name: Validator package

# Builds and installs the analitiq-connector-validator distribution and
# smoke-tests its console entry point. The pytest suite only ever runs the
# validator as a module by file path, so a packaging defect (a typo in
# pyproject's [project.scripts], py-modules, or package-dir) would ship a
# broken `analitiq-validate-connector` command with no test signal. This job
# is the one place the installed entry point is actually exercised — the same
# way the connector registry's CI installs and runs it.

on:
  pull_request:
    paths:
      - 'validator/**'
      - '.github/workflows/validator-package.yml'
  push:
    branches: [main]
    paths:
      - 'validator/**'
      - '.github/workflows/validator-package.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validator-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Build, install, run entry point
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build + install the package
        run: pip install ./validator

      - name: Console entry point runs Layer 2 (no plugin runtime, no schema host)
        run: |
          set -euo pipefail

          # 1) The command must exist on PATH and exit non-zero on a real
          #    defect: a fixture whose endpoint declares a native its read map
          #    doesn't cover must surface a type-map-coverage error.
          uncovered=tests/connector_validator/fixtures/api_endpoints_uncovered/connector.json
          if analitiq-validate-connector --document "$uncovered" --semantic-only; then
            echo "ERROR: expected non-zero exit on an uncovered connector"; exit 1
          fi

          # 2) A clean connector must pass under --semantic-only (no --schema-url,
          #    no network) — the registry gate's PASS path.
          analitiq-validate-connector \
            --document tests/connector_validator/fixtures/valid_api_connector/connector.json \
            --semantic-only

          echo "Entry point OK: fails on a coverage gap, passes a clean connector."
