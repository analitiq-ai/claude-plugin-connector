name: Publish analitiq-validator

# Build and publish the `analitiq-validator` package to PyPI on a
# `validator-vX.Y.Z` tag, via OIDC Trusted Publishing (no stored token).
#
# The validator is RENDERED from validator/src into the public
# `analitiq.validator` package by packages/validator/scripts/build.py and
# depends on `analitiq-contract-models` by version from PyPI. This replaces the
# old channel that synced the built files into the plugin repo (now this repo);
# consumers (the connector-builder plugin, the registry CI) now `pip install
# analitiq-validator` and run the `analitiq-validate` console
# script.
#
# Runbook:
#   1. Bump `version` in packages/validator/pyproject.toml (rc while iterating; final
#      X.Y.Z once). Merge to main.
#   2. Push a tag matching that version: `validator-v1.0.0rc2`.
#   3. This workflow asserts tag == pyproject version, runs the validator's own
#      test suite, builds sdist+wheel from the rendered package, and publishes.
#
# PyPI versions are immutable (single-use): iterate with pre-release suffixes
# (rc1, rc2, ...) and cut the final X.Y.Z once.
#
# Required PyPI Trusted Publisher (pypi.org -> project -> Publishing -> Add):
#   Owner: analitiq-ai   Repository: claude-code-plugins
#   Workflow name: validator-release.yml   Environment: pypi
# Tag-triggered only. These packages are deliberately NOT managed by
# release-please: it speaks SemVer and their versions are PEP 440 pre-releases
# (1.0.0rc12), which it resolves as plain 1.0.0 and then bumps - dropping the rc
# suffix and jumping the train to a final release. Push the tag by hand.
#
# A human-pushed tag triggers this normally. A tag created by the release-please
# action would NOT: GitHub suppresses workflow triggers from GITHUB_TOKEN to
# prevent loops. That is why no publish job can be wired to release-please
# output, and the second reason these stay manual.
on:
  push:
    tags:
      - "validator-v*"

permissions:
  contents: read

concurrency:
  group: validator-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    # The PyPI Trusted Publisher for this project is registered with
    # `Environment name: pypi`. PyPI checks the environment on its side, so a job
    # WITHOUT this key is rejected at the publish step of an otherwise green run.
    # The environment also restricts which tags may deploy. Do not remove it
    # without editing the publisher on PyPI to match.
    environment: pypi
    permissions:
      # A job-level permissions block REPLACES the workflow-level one (unspecified
      # perms become `none`), so `contents: read` must be re-granted here or
      # actions/checkout can't read the repo and the publish never builds.
      contents: read
      id-token: write # OIDC token for PyPI Trusted Publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Derive release version from tag
        id: ver
        # build.py --expect-version cross-checks this against pyproject.toml, so
        # a mistyped tag fails before anything is published.
        run: echo "version=${{GITHUB_REF_NAME#validator-v}}" >> "$GITHUB_OUTPUT"

      - name: Install build + test tooling
        # `jsonschema` is a declared validator dependency (it meta-validates the
        # JSON-Schema documents embedded in api-endpoints as Draft 2020-12); the
        # test suite exercises that path, so it must be present here just as in
        # tests.yml's PR-time gate. Kept in lockstep with its install step.
        run: pip install --quiet build "pydantic>=2.12,<3" "jsonschema>=4.18,<5" pytest

      - name: Build guards (version match, public-safe imports)
        run: python packages/validator/scripts/build.py --check --expect-version "${{ steps.ver.outputs.version }}"

      - name: Validator tests — never ship a validator that fails its own suite
        run: python -m pytest -q packages/validator/tests

      - name: Stage the rendered public package
        run: python packages/validator/scripts/build.py --dist "${{ runner.temp }}/v-src"

      - name: Build sdist + wheel
        run: python -m build --outdir "${{ runner.temp }}/v-dist" "${{ runner.temp }}/v-src"

      - name: Publish to PyPI (Trusted Publishing, OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ runner.temp }}/v-dist
          print-hash: true
